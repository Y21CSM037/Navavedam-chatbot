<head>

<title>Navavedam Wellness AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #faf6f0; --warm: #f5ede0; --bark: #c8956c; --bark-dark: #a0714f;
  --forest: #3d5a47; --forest-light: #4e7360; --gold: #c9a84c;
  --text: #2c1f14; --text-muted: #8a7060; --border: rgba(200,149,108,0.2);
  --surface: rgba(255,251,245,0.98); --shadow: rgba(44,31,20,0.12);
}
body {
  font-family: 'Jost', sans-serif; background: var(--cream);
  color: var(--text); min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 10% 0%, rgba(200,149,108,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 100%, rgba(61,90,71,0.1) 0%, transparent 60%);
  pointer-events: none;
}
.app {
  position: relative; z-index: 1; width: 100%; max-width: 780px;
  height: 100vh; display: flex; flex-direction: column; padding: 12px;
}
.header {
  background: var(--forest); border-radius: 20px 20px 0 0;
  padding: 16px 22px; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0;
}
.brand { display: flex; align-items: center; gap: 13px; }
.logo-wrap {
  width: 46px; height: 46px;
  background: linear-gradient(135deg, var(--gold), var(--bark));
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 20px; box-shadow: 0 4px 16px rgba(201,168,76,0.35);
  animation: breathe 4s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { box-shadow: 0 4px 16px rgba(201,168,76,0.35); }
  50% { box-shadow: 0 4px 26px rgba(201,168,76,0.55); }
}
.brand-text h1 { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 600; color: var(--cream); line-height: 1; }
.brand-text p { font-size: 11px; color: rgba(250,246,240,0.6); margin-top: 2px; letter-spacing: 0.8px; text-transform: uppercase; }
.online-pill { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 5px 12px; font-size: 11px; color: rgba(250,246,240,0.8); }
.pulse { width: 6px; height: 6px; background: #6fcf6f; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
.filter-bar { background: var(--warm); border-left: 1px solid var(--border); border-right: 1px solid var(--border); padding: 10px 14px; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip { padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: all 0.18s; font-family: 'Jost', sans-serif; }
.filter-chip:hover, .filter-chip.active { background: var(--forest); color: var(--cream); border-color: var(--forest); }
.chat { flex: 1; overflow-y: auto; padding: 18px 16px; background: var(--surface); border-left: 1px solid var(--border); border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
.chat::-webkit-scrollbar { width: 3px; }
.chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.msg { display: flex; gap: 10px; animation: fadeUp 0.3s ease both; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.msg.user { flex-direction: row-reverse; }
.av { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; margin-top: 2px; }
.av.bot { background: var(--forest); color: var(--cream); }
.av.user { background: var(--warm); border: 1px solid var(--border); }
.bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.7; }
.msg.bot .bubble { background: white; border: 1px solid var(--border); border-top-left-radius: 4px; color: var(--text); box-shadow: 0 2px 12px var(--shadow); }
.msg.user .bubble { background: var(--forest); color: var(--cream); border-top-right-radius: 4px; }
.bot-name { font-family: 'Cormorant Garamond', serif; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
.prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-top: 10px; }
.prod-card { background: var(--warm); border: 1px solid var(--border); border-radius: 12px; padding: 12px; cursor: pointer; transition: all 0.2s; }
.prod-card:hover { border-color: var(--bark); transform: translateY(-2px); box-shadow: 0 6px 18px var(--shadow); }
.prod-card .icon { font-size: 22px; margin-bottom: 6px; }
.prod-card .pname { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 4px; }
.prod-card .pprice { font-size: 12px; color: var(--forest-light); font-weight: 600; }
.prod-card .pcat { font-size: 10px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; }
.quick-replies { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.qr { padding: 5px 12px; border-radius: 20px; font-size: 12px; border: 1px solid var(--border); background: var(--warm); color: var(--text-muted); cursor: pointer; transition: all 0.18s; font-family: 'Jost', sans-serif; }
.qr:hover { background: var(--forest); color: var(--cream); border-color: var(--forest); }
.typing-wrap { display: flex; gap: 10px; align-items: center; }
.typing-dots { background: white; border: 1px solid var(--border); border-radius: 18px; border-top-left-radius: 4px; padding: 12px 16px; display: flex; gap: 4px; box-shadow: 0 2px 12px var(--shadow); }
.typing-dots span { width: 6px; height: 6px; background: var(--bark); border-radius: 50%; animation: dotBounce 1.2s ease-in-out infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.18s; }
.typing-dots span:nth-child(3) { animation-delay: 0.36s; }
@keyframes dotBounce { 0%,60%,100% { transform:translateY(0); opacity:0.4; } 30% { transform:translateY(-5px); opacity:1; } }
.contact-form { background: var(--warm); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-top: 10px; }
.contact-form h4 { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
.cf-input, .cf-textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; background: white; font-family: 'Jost', sans-serif; font-size: 13px; color: var(--text); outline: none; margin-bottom: 8px; transition: border-color 0.2s; }
.cf-input:focus, .cf-textarea:focus { border-color: var(--bark); }
.cf-textarea { resize: none; height: 70px; }
.cf-btn { background: var(--forest); color: var(--cream); border: none; border-radius: 8px; padding: 9px 20px; font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; }
.cf-btn:hover { background: var(--forest-light); }
.input-area { background: white; border: 1px solid var(--border); border-radius: 0 0 20px 20px; padding: 12px 14px; display: flex; align-items: flex-end; gap: 10px; flex-shrink: 0; box-shadow: 0 -2px 12px var(--shadow); }
.input-box { flex: 1; background: var(--warm); border: 1px solid var(--border); border-radius: 12px; padding: 9px 14px; display: flex; align-items: flex-end; transition: border-color 0.2s; }
.input-box:focus-within { border-color: var(--bark); box-shadow: 0 0 0 3px rgba(200,149,108,0.1); }
textarea#inp { flex: 1; background: transparent; border: none; outline: none; font-family: 'Jost', sans-serif; font-size: 14px; color: var(--text); resize: none; max-height: 90px; line-height: 1.5; scrollbar-width: none; }
textarea#inp::placeholder { color: var(--text-muted); }
.send { width: 38px; height: 38px; border-radius: 10px; background: var(--forest); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; margin-left: 8px; box-shadow: 0 3px 10px rgba(61,90,71,0.3); }
.send:hover { background: var(--forest-light); transform: scale(1.05); }
.send svg { width: 16px; height: 16px; fill: var(--cream); }
.footer { text-align: center; font-size: 10px; color: var(--text-muted); padding: 5px 0 0; flex-shrink: 0; }
.footer a { color: var(--bark-dark); text-decoration: none; }
.debug { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 8px 12px; font-size: 11px; color: #856404; margin: 4px 0; display: none; }
</style>
</head>

};

let history = [];

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 90) + 'px';
}

function quickSend(text, el) {
  if (!text) return;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('inp').value = text;
  send();
}

async function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = ''; inp.style.height = 'auto';

  // Add user message to UI
  addUserMsg(text);
  history.push({ role: 'user', content: text });

  const typing = addTyping();

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });

    const data = await response.json();
    typing.remove();

    if (!response.ok) {
      renderBot('Sorry, something went wrong. Please try again or contact naturecare@navavedamwellness.com', [], false);
      return;
    }

    // Get raw content from Groq response
    const raw = data.choices?.[0]?.message?.content || '';
    history.push({ role: 'assistant', content: raw });

    // Parse JSON response
    let parsed = { reply: '', show_contact: false, products: [] };
    try {
      // Clean any markdown code fences
      const clean = raw.replace(/```json\n?/gi, '').replace(/```\n?/gi, '').trim();
      // Find JSON object
      const jsonMatch = clean.match(/\{[\s\S]*\}/);
      if (jsonMatch) {
        parsed = JSON.parse(jsonMatch[0]);
      } else {
        parsed.reply = clean;
      }
    } catch (e) {
      parsed.reply = raw;
      parsed.show_contact = false;
      parsed.products = [];
    }

    // Get matched products
    const matchedProducts = (parsed.products || [])
      .map(name => {
        const key = Object.keys(PRODUCTS).find(k => k.toLowerCase() === name.toLowerCase());
        return key ? { name: key, ...PRODUCTS[key] } : null;
      })
      .filter(Boolean);

    renderBot(parsed.reply || 'I could not process that. Please try again.', matchedProducts, parsed.show_contact === true);

  } catch (err) {
    typing.remove();
    renderBot('Connection error. Please check your internet and try again.', [], false);
  }
}

function addUserMsg(text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="av user">🙋</div><div class="bubble">${escapeHtml(text)}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function renderBot(replyText, products, showContact) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg bot';

  const formatted = replyText
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');

  let prodHTML = '';
  if (products && products.length > 0) {
    prodHTML = `<div class="prod-grid">${products.map(p => `
      <div class="prod-card" onclick="askProduct('${p.name.replace(/'/g,"\\'")}')">
        <div class="icon">${p.icon}</div>
        <div class="pname">${p.name}</div>
        <div class="pprice">${p.price}</div>
        <div class="pcat">${p.cat}</div>
      </div>`).join('')}</div>`;
  }

  let contactHTML = '';
  if (showContact === true) {
    const id = Date.now();
    contactHTML = `
      <div class="contact-form">
        <h4>📬 Contact Our Wellness Team</h4>
        <input class="cf-input" id="cfn${id}" placeholder="Your name">
        <input class="cf-input" id="cfe${id}" placeholder="Your email" type="email">
        <textarea class="cf-textarea" id="cfm${id}" placeholder="Your message…"></textarea>
        <button class="cf-btn" onclick="submitContact(this,'${id}')">Send Message 🌿</button>
      </div>`;
  }

  const suggestions = getSuggestions(replyText);
  const qrHTML = suggestions.length ? `<div class="quick-replies">${suggestions.map(q =>
    `<div class="qr" onclick="quickSend('${q.replace(/'/g,"\\'")}', null)">→ ${q}</div>`
  ).join('')}</div>` : '';

  div.innerHTML = `
    <div class="av bot">🌿</div>
    <div class="bubble">
      <div class="bot-name">Veda · Navavedam AI</div>
      <div>${formatted}</div>
      ${prodHTML}${contactHTML}${qrHTML}
    </div>`;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'typing-wrap';
  div.innerHTML = `<div class="av bot">🌿</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function askProduct(name) {
  document.getElementById('inp').value = `Tell me more about ${name}`;
  send();
}

function getSuggestions(reply) {
  const r = reply.toLowerCase();
  if (r.includes('hair fall') || r.includes('hair loss')) return ['What causes hair fall?', 'How long to use hair oil?', 'Which shampoo for hair fall?'];
  if (r.includes('dandruff')) return ['How to use anti dandruff oil?', 'Which shampoo for dandruff?'];
  if (r.includes('acne') || r.includes('oily')) return ['How to use neem face wash?', 'Which serum for acne?', 'What causes acne?'];
  if (r.includes('dry') || r.includes('moisture')) return ['Which moisturiser is best?', 'How to use sleeping mask?'];
  if (r.includes('pigmentation') || r.includes('dark spot')) return ['How long to see results?', 'Which serum for glow?'];
  if (r.includes('aging') || r.includes('fine line')) return ['Tell me about Kumkumadi Serum', 'Anti aging routine?'];
  return ['I have hair fall', 'My skin is oily', 'I want to improve glow', 'I have dry skin'];
}

function submitContact(btn, id) {
  const name = document.getElementById('cfn' + id)?.value;
  const email = document.getElementById('cfe' + id)?.value;
  const msg = document.getElementById('cfm' + id)?.value;
  if (!name || !email || !msg) { alert('Please fill all fields.'); return; }
  btn.closest('.contact-form').innerHTML = `<p style="color:var(--forest);font-size:13px;">✅ Thank you <strong>${name}</strong>! Our team will reply to <strong>${email}</strong> within 24 hours. 🌿</p>`;
}

function escapeHtml(text) {
