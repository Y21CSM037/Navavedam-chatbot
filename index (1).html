*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {

}
body {
  font-family: 'Jost', sans-serif; background: var(--cream);
  color: var(--text); min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 0%, rgba(200,149,108,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 100%, rgba(61,90,71,0.1) 0%, transparent 60%);
  pointer-events: none;
}
.leaf { position: fixed; pointer-events: none; opacity: 0.05; }
.leaf1 { top: -20px; left: -20px; font-size: 120px; transform: rotate(-30deg); }
.leaf2 { bottom: -20px; right: -20px; font-size: 100px; transform: rotate(150deg); }
.app {
  position: relative; z-index: 1; width: 100%; max-width: 780px;
  height: 100vh; max-height: 100vh; display: flex; flex-direction: column; padding: 12px;
}
.header {
  background: var(--forest); border-radius: 20px 20px 0 0;
  padding: 16px 22px; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0;
}
.brand { display: flex; align-items: center; gap: 13px; }
.logo-wrap {
  width: 46px; height: 46px;
  background: linear-gradient(135deg, var(--gold), var(--bark));
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 20px; box-shadow: 0 4px 16px rgba(201,168,76,0.35);
  animation: breathe 4s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { box-shadow: 0 4px 16px rgba(201,168,76,0.35); }
  50% { box-shadow: 0 4px 26px rgba(201,168,76,0.55); }
}
.brand-text h1 {
  font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 600;
  color: var(--cream); letter-spacing: 0.3px; line-height: 1;
}
.brand-text p {
  font-size: 11px; color: rgba(250,246,240,0.6);
  margin-top: 2px; letter-spacing: 0.8px; text-transform: uppercase;
}
.online-pill {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px; padding: 5px 12px;
  font-size: 11px; color: rgba(250,246,240,0.8); letter-spacing: 0.5px;
}
.pulse {
  width: 6px; height: 6px; background: #6fcf6f;
  border-radius: 50%; animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
.filter-bar {
  background: var(--warm); border-left: 1px solid var(--border);
  border-right: 1px solid var(--border); padding: 10px 14px;
  display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-chip {
  padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--border); background: transparent; color: var(--text-muted);
  cursor: pointer; white-space: nowrap; transition: all 0.18s; font-family: 'Jost', sans-serif;
}
.filter-chip:hover, .filter-chip.active {
  background: var(--forest); color: var(--cream); border-color: var(--forest);
}
.chat {
  flex: 1; overflow-y: auto; padding: 18px 16px; background: var(--surface);
  border-left: 1px solid var(--border); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth;
}
.chat::-webkit-scrollbar { width: 3px; }
.chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.msg { display: flex; gap: 10px; animation: fadeUp 0.3s ease both; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.msg.user { flex-direction: row-reverse; }
.av {

.av.bot { background: var(--forest); color: var(--cream); }
.av.user { background: var(--warm); border: 1px solid var(--border); }

.typing-dots span:nth-child(3) { animation-delay: 0.36s; }

.input-area {

function buildKB() {
  let kb = `COMPANY: Navavedam Wellness | Website: https://navavedamwellness.com | Support: naturecare@navavedamwellness.com
Philosophy: Traditional Ayurvedic wisdom, all-natural, chemical-free products. Price Range: ₹150–₹4,250\n\nPRODUCTS:\n`;
  PRODUCTS.forEach(p => {
    kb += `• ${p.name} | ${p.cat} | ₹${p.mrp1}/${p.qty1}gm${p.qty2?` or ₹${p.mrp2}/${p.qty2}gm`:''} | Skin: ${p.skin} | Ingredients: ${p.main.join(', ')} | ${p.desc}\n`;
  });
  return kb;
}

const SYSTEM = `You are the AI assistant for Navavedam Wellness, a premium natural Ayurvedic wellness brand.\n\n${buildKB()}\n\nRULES:\n1. ONLY answer using the above data. Never make up information.\n2. If question is outside your knowledge, say you don't have that info and suggest contacting naturecare@navavedamwellness.com — set show_contact:true.\n3. Never discuss competitors or unrelated topics.\n4. Be warm, helpful, match Ayurvedic wellness tone.\n5. Always mention prices in ₹.\n6. For recommendations suggest 2-4 products by exact names.\n\nRespond ONLY as valid JSON:\n{"reply":"your response","show_contact":false,"products":["Exact Product Name"]}`;

let history = [];

function setFilter(cat, el) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  if (cat !== 'all') {
    const filtered = PRODUCTS.filter(p => p.cat === cat);
    renderBot(`Here are our **${cat}** products — ${filtered.length} items crafted with natural Ayurvedic ingredients. Which interests you?`,
      filtered.slice(0,6), false, [`Best seller in ${cat}`, `${cat} for sensitive skin`, `Ingredients in ${cat}`]);
  }
}

function handleKey(e) { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,90)+'px'; }

async function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  inp.value=''; inp.style.height='auto';
  const chat = document.getElementById('chat');
  const um = document.createElement('div');
  um.className='msg user';
  um.innerHTML=`<div class="av user">🙋</div><div class="bubble">${text}</div>`;
  chat.appendChild(um); chat.scrollTop=chat.scrollHeight;
  history.push({role:'user',content:text});
  const typing = addTyping();
  try {
    // Calls our secure Vercel backend — API key is hidden on server
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        messages:[{role:'system',content:SYSTEM},...history]
      })
    });
    const data = await res.json();
    typing.remove();
    if (!res.ok) { renderBot(`Sorry, something went wrong. Please contact naturecare@navavedamwellness.com`,[], true,[]); return; }
    const raw = data.choices?.[0]?.message?.content || '{"reply":"Please try again.","show_contact":false,"products":[]}';
    history.push({role:'assistant',content:raw});
    let parsed;
    try { parsed=JSON.parse(raw.replace(/```json|```/g,'').trim()); }
    catch(e) { parsed={reply:raw,show_contact:false,products:[]}; }
    const matchedProds=(parsed.products||[]).map(n=>PRODUCTS.find(p=>p.name.toLowerCase()===n.toLowerCase())).filter(Boolean);
    renderBot(parsed.reply, matchedProds, parsed.show_contact, getSuggestions(text));
  } catch(err) {
    typing.remove();
    renderBot('Connection error. Please try again or contact naturecare@navavedamwellness.com',[],true,[]);
  }
}

function getSuggestions(msg) {
  const m=msg.toLowerCase();
  if(m.includes('hair')) return ['Hair growth tips','Anti dandruff','Hair fall solutions'];
  if(m.includes('face')||m.includes('skin')) return ['For oily skin','For dry skin','Anti aging'];
  if(m.includes('soap')||m.includes('body')) return ['Cold processed soaps','Bath salts','Body scrubs'];
  if(m.includes('tea')||m.includes('wellness')) return ['Immunity teas','Morning tea','Wellness blends'];
  if(m.includes('baby')) return ['Baby massage oil','Baby bath powder','Safe for newborns?'];
  if(m.includes('perfume')) return ['Sleep perfume','Focus blend','Floral scents'];
  return ['Best sellers','Gift ideas','Sensitive skin products'];
}

function renderBot(replyText, products, showContact, quickReplies) {
  const chat=document.getElementById('chat');
  const div=document.createElement('div');
  div.className='msg bot';
  const formatted=replyText.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  let prodHTML='';
  if(products?.length) prodHTML=`<div class="prod-grid">${products.map(p=>`<div class="prod-card" onclick="askProduct('${p.name.replace(/'/g,"\\'")}')"><div class="icon">${p.icon}</div><div class="pname">${p.name}</div><div class="pprice">₹${p.mrp1}/${p.qty1}gm</div><div class="pcat">${p.sub}</div></div>`).join('')}</div>`;
  let contactHTML='';
  if(showContact) {
    const id=Date.now();
    contactHTML=`<div class="contact-form"><h4>📬 Contact Our Wellness Team</h4><input class="cf-input" id="cfn${id}" placeholder="Your name"><input class="cf-input" id="cfe${id}" placeholder="Your email" type="email"><textarea class="cf-textarea" id="cfm${id}" placeholder="Your question…"></textarea><button class="cf-btn" onclick="submitContact(this,'${id}')">Send Message 🌿</button></div>`;
  }
  let qrHTML='';
  if(quickReplies?.length) qrHTML=`<div class="quick-replies">${quickReplies.map(q=>`<div class="qr" onclick="quickSend('${q.replace(/'/g,"\\'")}')">→ ${q}</div>`).join('')}</div>`;
  div.innerHTML=`<div class="av bot">🌿</div><div class="bubble"><div class="bot-name">Navavedam AI</div><div>${formatted}</div>${prodHTML}${contactHTML}${qrHTML}</div>`;
  chat.appendChild(div); chat.scrollTop=chat.scrollHeight;
}

function addTyping() {
  const chat=document.getElementById('chat');
  const div=document.createElement('div');
  div.className='typing-wrap';
  div.innerHTML=`<div class="av bot">🌿</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
  chat.appendChild(div); chat.scrollTop=chat.scrollHeight;
  return div;
}

function askProduct(name) { document.getElementById('inp').value=`Tell me more about ${name}`; send(); }
function quickSend(text) { document.getElementById('inp').value=text; send(); }
function submitContact(btn, id) {
  const name=document.getElementById('cfn'+id)?.value;
  const email=document.getElementById('cfe'+id)?.value;
  const msg=document.getElementById('cfm'+id)?.value;
  if(!name||!email||!msg){alert('Please fill all fields.');return;}
  btn.closest('.contact-form').innerHTML=`<p style="color:var(--forest);font-size:13px;">✅ Thank you <strong>${name}</strong>! Our team will reply to <strong>${email}</strong> within 24 hours. 🌿</p>`;
}
